<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard | Josiahblez Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        /* Container */
        .admin-container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Header */
        .admin-header {
            background: white;
            border-radius: 15px;
            padding: 20px 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .logo h1 {
            font-size: 24px;
            color: #333;
        }

        .logo h1 i {
            color: #667eea;
            margin-right: 10px;
        }

        .logo p {
            color: #666;
            font-size: 14px;
            margin-top: 5px;
        }

        .stats {
            display: flex;
            gap: 20px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 15px 25px;
            border-radius: 10px;
            text-align: center;
            min-width: 100px;
        }

        .stat-card i {
            font-size: 24px;
            margin-bottom: 5px;
        }

        .stat-card .number {
            font-size: 28px;
            font-weight: bold;
        }

        .stat-card .label {
            font-size: 12px;
            opacity: 0.9;
        }

        /* Filters */
        .filters {
            background: white;
            border-radius: 15px;
            padding: 20px 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
        }

        .filter-buttons {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 8px 20px;
            border: none;
            background: #f0f0f0;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 14px;
        }

        .filter-btn.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .filter-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .search-box {
            display: flex;
            gap: 10px;
        }

        .search-box input {
            padding: 8px 15px;
            border: 1px solid #ddd;
            border-radius: 25px;
            width: 250px;
            outline: none;
        }

        .search-box button {
            padding: 8px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
        }

        /* Messages Grid */
        .messages-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 25px;
        }

        /* Message Card */
        .message-card {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            transition: transform 0.3s, box-shadow 0.3s;
            animation: fadeInUp 0.5s ease;
        }

        .message-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.15);
        }

        .message-header {
            padding: 20px;
            background: linear-gradient(135deg, #f8f9fa, #e9ecef);
            border-bottom: 3px solid;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .message-card.unread .message-header {
            border-bottom-color: #667eea;
            background: linear-gradient(135deg, #f0f4ff, #e8eeff);
        }

        .message-card.read .message-header {
            border-bottom-color: #6c757d;
        }

        .message-card.replied .message-header {
            border-bottom-color: #28a745;
        }

        .message-card.archived .message-header {
            border-bottom-color: #ffc107;
            opacity: 0.7;
        }

        .sender-info h3 {
            font-size: 18px;
            color: #333;
            margin-bottom: 5px;
        }

        .sender-info .email {
            font-size: 12px;
            color: #666;
        }

        .status-badge {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .status-unread {
            background: #667eea;
            color: white;
        }

        .status-read {
            background: #6c757d;
            color: white;
        }

        .status-replied {
            background: #28a745;
            color: white;
        }

        .status-archived {
            background: #ffc107;
            color: #333;
        }

        .message-body {
            padding: 20px;
        }

        .message-subject {
            font-size: 16px;
            font-weight: bold;
            color: #333;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
        }

        .message-subject i {
            color: #667eea;
            margin-right: 8px;
        }

        .message-text {
            color: #555;
            line-height: 1.6;
            font-size: 14px;
            margin-bottom: 15px;
            max-height: 100px;
            overflow-y: auto;
        }

        .message-date {
            font-size: 11px;
            color: #999;
            margin-top: 10px;
        }

        .message-actions {
            padding: 15px 20px;
            background: #f8f9fa;
            display: flex;
            gap: 10px;
            border-top: 1px solid #eee;
        }

        .action-btn {
            padding: 6px 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 12px;
            transition: all 0.3s;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .action-btn i {
            font-size: 11px;
        }

        .btn-read {
            background: #6c757d;
            color: white;
        }

        .btn-replied {
            background: #28a745;
            color: white;
        }

        .btn-archive {
            background: #ffc107;
            color: #333;
        }

        .btn-delete {
            background: #dc3545;
            color: white;
        }

        .action-btn:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            background: white;
            border-radius: 15px;
        }

        .empty-state i {
            font-size: 64px;
            color: #ddd;
            margin-bottom: 20px;
        }

        .empty-state h3 {
            color: #666;
            margin-bottom: 10px;
        }

        /* Loading State */
        .loading {
            text-align: center;
            padding: 50px;
        }

        .loading i {
            font-size: 48px;
            color: #667eea;
            animation: spin 1s linear infinite;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: white;
            border-radius: 15px;
            max-width: 500px;
            width: 90%;
            padding: 30px;
            animation: fadeInUp 0.3s ease;
        }

        .modal-content h3 {
            margin-bottom: 20px;
        }

        .modal-content textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 8px;
            resize: vertical;
            font-family: inherit;
            margin-bottom: 20px;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .modal-buttons button {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }

        /* Animations */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .admin-header {
                flex-direction: column;
                text-align: center;
            }

            .stats {
                justify-content: center;
            }

            .filters {
                flex-direction: column;
            }

            .search-box {
                width: 100%;
            }

            .search-box input {
                flex: 1;
            }

            .messages-grid {
                grid-template-columns: 1fr;
            }
        }

        /* Refresh Button */
        .refresh-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s;
        }

        .refresh-btn:hover {
            transform: rotate(180deg);
        }

        /* Toast Notification */
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            background: #333;
            color: white;
            padding: 12px 24px;
            border-radius: 8px;
            z-index: 1001;
            animation: slideInRight 0.3s ease;
        }

        @keyframes slideInRight {
            from {
                transform: translateX(100%);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="admin-container">
        <!-- Header -->
        <div class="admin-header">
            <div class="logo">
                <h1><i class="fas fa-envelope"></i> Message Dashboard</h1>
                <p>Manage your portfolio contact messages</p>
            </div>
            <div class="stats">
                <div class="stat-card">
                    <i class="fas fa-envelope"></i>
                    <div class="number" id="totalCount">0</div>
                    <div class="label">Total Messages</div>
                </div>
                <div class="stat-card">
                    <i class="fas fa-bell"></i>
                    <div class="number" id="unreadCount">0</div>
                    <div class="label">Unread</div>
                </div>
            </div>
            <button class="refresh-btn" onclick="loadMessages()">
                <i class="fas fa-sync-alt"></i> Refresh
            </button>
        </div>

        <!-- Filters -->
        <div class="filters">
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">All</button>
                <button class="filter-btn" data-filter="unread">Unread</button>
                <button class="filter-btn" data-filter="read">Read</button>
                <button class="filter-btn" data-filter="replied">Replied</button>
                <button class="filter-btn" data-filter="archived">Archived</button>
            </div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Search by name, email, or subject...">
                <button onclick="searchMessages()"><i class="fas fa-search"></i></button>
            </div>
        </div>

        <!-- Messages Grid -->
        <div id="messagesContainer" class="messages-grid">
            <div class="loading">
                <i class="fas fa-spinner fa-spin"></i>
                <p>Loading messages...</p>
            </div>
        </div>
    </div>

    <!-- Reply Modal -->
    <div id="replyModal" class="modal">
        <div class="modal-content">
            <h3><i class="fas fa-reply"></i> Reply to Message</h3>
            <textarea id="replyMessage" rows="5" placeholder="Type your reply here..."></textarea>
            <div class="modal-buttons">
                <button onclick="closeModal()" style="background:#6c757d; color:white;">Cancel</button>
                <button onclick="sendReply()" style="background:#28a745; color:white;">Send Reply</button>
            </div>
        </div>
    </div>

    <script>
        let currentMessages = [];
        let currentFilter = 'all';
        let currentSearch = '';
        let selectedMessageId = null;

        // API Configuration
        const API_BASE = 'http://localhost:5000/api';
        const ADMIN_API_KEY = 'your-secret-key-123'; // Change this to match your .env file

        // Load messages on page load
        document.addEventListener('DOMContentLoaded', () => {
            loadMessages();
            
            // Setup filter buttons
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.addEventListener('click', function() {
                    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
                    this.classList.add('active');
                    currentFilter = this.getAttribute('data-filter');
                    renderMessages();
                });
            });

            // Setup search on Enter key
            document.getElementById('searchInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') searchMessages();
            });
        });

        // Load messages from API
        async function loadMessages() {
            showLoading();
            try {
                const response = await fetch(`${API_BASE}/messages`, {
                    headers: {
                        'x-api-key': ADMIN_API_KEY
                    }
                });
                
                if (!response.ok) throw new Error('Failed to load messages');
                
                const result = await response.json();
                if (result.success) {
                    currentMessages = result.data;
                    updateStats();
                    renderMessages();
                }
            } catch (error) {
                console.error('Error loading messages:', error);
                showToast('Failed to load messages. Make sure the server is running.', 'error');
                document.getElementById('messagesContainer').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-exclamation-triangle"></i>
                        <h3>Connection Error</h3>
                        <p>Make sure the backend server is running on port 5000</p>
                    </div>
                `;
            }
        }

        // Update statistics
        function updateStats() {
            const total = currentMessages.length;
            const unread = currentMessages.filter(m => m.status === 'unread').length;
            document.getElementById('totalCount').textContent = total;
            document.getElementById('unreadCount').textContent = unread;
        }

        // Render messages based on filter and search
        function renderMessages() {
            let filtered = [...currentMessages];
            
            // Apply filter
            if (currentFilter !== 'all') {
                filtered = filtered.filter(m => m.status === currentFilter);
            }
            
            // Apply search
            if (currentSearch) {
                const searchLower = currentSearch.toLowerCase();
                filtered = filtered.filter(m => 
                    m.name.toLowerCase().includes(searchLower) ||
                    m.email.toLowerCase().includes(searchLower) ||
                    m.subject.toLowerCase().includes(searchLower) ||
                    m.message.toLowerCase().includes(searchLower)
                );
            }
            
            // Sort by newest first
            filtered.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
            
            if (filtered.length === 0) {
                document.getElementById('messagesContainer').innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-inbox"></i>
                        <h3>No messages found</h3>
                        <p>${currentSearch ? 'Try a different search term' : 'When people contact you, messages will appear here'}</p>
                    </div>
                `;
                return;
            }
            
            document.getElementById('messagesContainer').innerHTML = filtered.map(msg => `
                <div class="message-card ${msg.status}" data-id="${msg._id}">
                    <div class="message-header">
                        <div class="sender-info">
                            <h3><i class="fas fa-user-circle"></i> ${escapeHtml(msg.name)}</h3>
                            <div class="email"><i class="fas fa-envelope"></i> ${escapeHtml(msg.email)}</div>
                        </div>
                        <span class="status-badge status-${msg.status}">
                            <i class="fas ${getStatusIcon(msg.status)}"></i> ${msg.status}
                        </span>
                    </div>
                    <div class="message-body">
                        <div class="message-subject">
                            <i class="fas fa-tag"></i> ${escapeHtml(msg.subject)}
                        </div>
                        <div class="message-text">
                            ${escapeHtml(msg.message)}
                        </div>
                        <div class="message-date">
                            <i class="fas fa-calendar-alt"></i> ${formatDate(msg.createdAt)}
                            ${msg.ipAddress ? `<br><i class="fas fa-map-marker-alt"></i> ${msg.ipAddress}` : ''}
                        </div>
                    </div>
                    <div class="message-actions">
                        ${msg.status !== 'read' ? `<button class="action-btn btn-read" onclick="updateStatus('${msg._id}', 'read')"><i class="fas fa-check"></i> Mark Read</button>` : ''}
                        ${msg.status !== 'replied' ? `<button class="action-btn btn-replied" onclick="openReplyModal('${msg._id}', '${escapeHtml(msg.name)}')"><i class="fas fa-reply"></i> Reply</button>` : ''}
                        ${msg.status !== 'archived' ? `<button class="action-btn btn-archive" onclick="updateStatus('${msg._id}', 'archived')"><i class="fas fa-archive"></i> Archive</button>` : ''}
                        <button class="action-btn btn-delete" onclick="deleteMessage('${msg._id}')"><i class="fas fa-trash"></i> Delete</button>
                    </div>
                </div>
            `).join('');
        }

        // Update message status
        async function updateStatus(id, status) {
            try {
                const response = await fetch(`${API_BASE}/messages/${id}/status`, {
                    method: 'PATCH',
                    headers: {
                        'Content-Type': 'application/json',
                        'x-api-key': ADMIN_API_KEY
                    },
                    body: JSON.stringify({ status })
                });
                
                if (response.ok) {
                    showToast(`Message marked as ${status}`, 'success');
                    loadMessages(); // Reload to get fresh data
                }
            } catch (error) {
                console.error('Error updating status:', error);
                showToast('Failed to update status', 'error');
            }
        }

        // Delete message
        async function deleteMessage(id) {
            if (confirm('Are you sure you want to delete this message? This action cannot be undone.')) {
                try {
                    const response = await fetch(`${API_BASE}/messages/${id}`, {
                        method: 'DELETE',
                        headers: {
                            'x-api-key': ADMIN_API_KEY
                        }
                    });
                    
                    if (response.ok) {
                        showToast('Message deleted successfully', 'success');
                        loadMessages(); // Reload to refresh list
                    }
                } catch (error) {
                    console.error('Error deleting message:', error);
                    showToast('Failed to delete message', 'error');
                }
            }
        }

        // Open reply modal
        function openReplyModal(id, name) {
            selectedMessageId = id;
            document.getElementById('replyMessage').value = `Dear ${name},\n\n`;
            document.getElementById('replyModal').style.display = 'flex';
        }

        // Send reply (opens email client)
        function sendReply() {
            const message = document.getElementById('replyMessage').value;
            if (!message.trim()) {
                showToast('Please enter a reply message', 'error');
                return;
            }
            
            // Find the message to get email
            const msg = currentMessages.find(m => m._id === selectedMessageId);
            if (msg) {
                window.location.href = `mailto:${msg.email}?subject=Re: ${encodeURIComponent(msg.subject)}&body=${encodeURIComponent(message)}`;
                updateStatus(selectedMessageId, 'replied');
                closeModal();
                showToast('Email client opened. Send your reply.', 'success');
            }
        }

        // Close modal
        function closeModal() {
            document.getElementById('replyModal').style.display = 'none';
            selectedMessageId = null;
        }

        // Search messages
        function searchMessages() {
            currentSearch = document.getElementById('searchInput').value.trim();
            renderMessages();
        }

        // Helper functions
        function showLoading() {
            document.getElementById('messagesContainer').innerHTML = `
                <div class="loading">
                    <i class="fas fa-spinner fa-spin"></i>
                    <p>Loading messages...</p>
                </div>
            `;
        }

        function showToast(message, type = 'info') {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.innerHTML = `<i class="fas ${type === 'success' ? 'fa-check-circle' : 'fa-exclamation-circle'}"></i> ${message}`;
            toast.style.background = type === 'success' ? '#28a745' : '#dc3545';
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toLocaleString('en-US', {
                year: 'numeric',
                month: 'short',
                day: 'numeric',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        function getStatusIcon(status) {
            switch(status) {
                case 'unread': return 'fa-circle';
                case 'read': return 'fa-check-circle';
                case 'replied': return 'fa-reply-all';
                case 'archived': return 'fa-archive';
                default: return 'fa-envelope';
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Auto-refresh every 30 seconds
        setInterval(() => {
            loadMessages();
        }, 30000);

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('replyModal');
            if (event.target === modal) {
                closeModal();
            }
        }
    </script>
</body>
</html>
